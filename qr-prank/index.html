<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
body{
    margin:0;
    background:#000;
    color:#00ff66;
    font-family:Consolas, monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#box{
    width:90%;
    max-width:700px;
    text-align:center;
}

.progress{
    width:100%;
    height:25px;
    border:2px solid #00ff66;
    margin-top:20px;
}

.bar{
    height:100%;
    width:0%;
    background:#00ff66;
    transition:.08s linear;
}

.hidden{
    display:none;
}

h1{
    color:#fff;
}

button{
    margin-top:20px;
    padding:12px 30px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>
<body>

<div id="box">

<h2 id="text">Initializing...</h2>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

</div>

<script>

let bar=document.getElementById("bar");
let text=document.getElementById("text");

let p=0;

let interval=setInterval(()=>{

p++;

bar.style.width=p+"%";

if(p==30)
text.innerHTML="Checking QR Code...";

if(p==65)
text.innerHTML="Loading...";

if(p==100){

clearInterval(interval);

setTimeout(()=>{

document.getElementById("box").innerHTML=`
<h1>โดนหลอกแล้วงวน</h1>

<p>ขอตังค์หน่อย</p>

<button onclick="location.reload()">
เล่นอีกครั้ง
</button>
`;

},1000);

}

},40);

</script>

</body>
</html>
